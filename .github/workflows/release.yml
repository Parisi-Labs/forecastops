name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Publish via PyPI Trusted Publishing (OIDC) — no long-lived token.
    environment:
      name: pypi
      url: https://pypi.org/p/forecastops
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy forecastops
      - run: pytest
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
