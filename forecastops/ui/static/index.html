<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ForecastOps</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="brand">
        <span class="brand-mark">Fo</span>
        <div>
          <strong>ForecastOps</strong>
          <small>local only</small>
        </div>
      </div>
      <div class="filters">
        <label>
          Project
          <select id="projectFilter"></select>
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="">All</option>
            <option value="PASS">Pass</option>
            <option value="WARN">Warn</option>
            <option value="FAIL">Fail</option>
          </select>
        </label>
        <label>
          Search
          <input id="searchFilter" type="search" autocomplete="off">
        </label>
      </div>
      <div id="storeInfo" class="store-info"></div>
    </aside>
    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">Run index</p>
          <h1>Forecast Control Room</h1>
        </div>
        <button id="refreshButton" type="button">Refresh</button>
      </header>
      <section class="runs-section">
        <div class="section-head">
          <h2>Runs</h2>
          <span id="runCount"></span>
        </div>
        <div class="runs-table-wrap">
          <table id="runsTable">
            <thead>
              <tr>
                <th>Run</th>
                <th>Project</th>
                <th>Model</th>
                <th>Adapter</th>
                <th>Created</th>
                <th>Horizon</th>
                <th>Points</th>
                <th>MAE</th>
                <th>WAPE</th>
                <th>Bias</th>
                <th>Coverage</th>
                <th>Skill</th>
                <th>Validation</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <section id="detail" class="detail empty-state">
        <h2>No run selected</h2>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
