<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ForecastOps</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <strong>ForecastOps</strong>
        <span class="badge">local</span>
      </div>
      <div class="nav-label">Workspace</div>
      <nav class="nav">
        <a href="#/runs" data-view="runs">Runs</a>
        <a href="#/projects" data-view="projects">Projects</a>
        <a href="#/compare" data-view="compare">Compare</a>
      </nav>
      <div class="side-foot">
        <div class="nav-label">Store</div>
        <code id="storeInfo" class="store-info"></code>
      </div>
    </aside>
    <div class="content">
      <header class="topbar">
        <nav class="crumbs" id="crumbs">Runs</nav>
        <span id="topMeta" class="count"></span>
        <button id="refreshButton" type="button" class="secondary">Refresh</button>
      </header>
      <main id="view"></main>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
